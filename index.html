<!DOCTYPE html>
<html>
<head>
    <title>Call Of Duty Mobile Giveaway</title>
    <meta http-equiv="content-type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <meta property="og:title" content="Call Of Duty Mobile Giveaway">
    <meta property="og:description" content="Click enter now to continue.">

    <link rel="icon" type="image/icon" href="img/favicon.png">

    <!-- Existing CSS files. No CSS changes needed. -->
    <link href="css/font-awesome.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="outdatedbrowser/outdatedbrowser.min.css" rel="stylesheet">
    <link href="css/sweet-alert.css" rel="stylesheet">
    <link href="css/animate.css" rel="stylesheet">
    <link href="css/magnific-popup.css" rel="stylesheet">
    <link href="css/hover-min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="css/jquery-labelauty.css">

    <script src="ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script type="text/javascript" src="css/jquery-labelauty.js"></script>
</head>

<body background="img/bg.jpg">

    <div class="Header">
        <div class="inner">
            <center>
                <img src="img/logo.png" height="auto" width="auto" class="img-responsive logo" alt="Call Of Duty Mobile Giveaway">
            </center>
            <br>
        </div>

        <!-- First screen: only Enter Now -->
        <section class="generator-section" id="landingSection">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 col-md-offset-2">
                        <div class="generator-form" style="height: 100%;">
                            <div class="hackgame">
                                <h1 class="text-center">Call Of Duty Mobile Giveaway</h1>
                            </div>

                            <div class="divider"></div>

                            <div class="inside">
                                <div class="row">
                                    <div class="col-md-12">
                                        <p class="text-center">
                                            Click below to enter now.
                                        </p>
                                    </div>
                                </div>

                                <div class="row" style="margin-top: 15px;">
                                    <div class="col-md-12">
                                        <div class="form-group cc-btn-wrap">
                                            <button id="enterNowBtn" class="generate-btn hvr-float-shadow" type="button">
                                                <i class="fa fa-arrow-right"></i> Enter Now
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Original tab/form: hidden first, shown after Enter Now -->
        <section class="generator-section" id="originalFormSection" style="display: none;">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 col-md-offset-2">

                        <div class="generator-form" style="height: 100%;">
                            <div class="hackgame">
                                <h1 class="text-center">Call Of Duty Mobile Giveaway</h1>
                            </div>

                            <div class="divider"></div>

                            <div class="inside">
                                <form id="entryForm" novalidate>
                                    <div class="step-one">
                                        <div class="nojs">
                                            <div class="row">
                                                <div class="col-md-6">
                                                    <div class="form-group cc-username-wrap">
                                                        <label for="ccUsername">
                                                            <span class="label label-primary">Gamer ID</span>
                                                        </label>
                                                        <input type="text" class="form-control cc-select-icon cc-user-icon" id="ccUsername" name="gamerId" placeholder="ENTER YOUR COD MOBILE GAMER ID">
                                                    </div>
                                                </div>

                                                <div class="col-md-6">
                                                    <div class="form-group cc-mode-wrap">
                                                        <label for="ccModeSelect">
                                                            <span class="label label-primary">Platform</span>
                                                        </label>
                                                        <div class="selectFieldWrapper" name="ccMode" id="ccMode">
                                                            <select class="form-control cc-select-icon cc-mode-icon" id="ccModeSelect" name="platform">
                                                                <option value="Android">Android</option>
                                                                <option value="iOS">iOS/iPhone/iPad</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <!-- Email section added inside the original tab -->
                                            <div class="row">
                                                <div class="col-md-12">
                                                    <div class="form-group cc-email-wrap">
                                                        <label for="visitorEmail">
                                                            <span class="label label-primary">Email</span>
                                                        </label>
                                                        <input type="email" class="form-control" id="visitorEmail" name="email" placeholder="ENTER YOUR EMAIL ADDRESS">
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="row">
                                                <div class="col-md-12">
                                                    <div class="form-group cc-coins-wrap">
                                                        <label for="ccCoinsSelect">
                                                            <span class="label label-primary">currency1</span>
                                                        </label>
                                                        <div class="selectFieldWrapper" name="ccCoins" id="ccCoins">
                                                            <select style="background-image: url(img/cr1.png);" class="form-control cc-select-icon cc-Crystals-icon" id="ccCoinsSelect" name="currency">
                                                                <option value="20000">20000 currency1</option>
                                                                <option value="40000">40000 currency1</option>
                                                                <option value="60000">60000 currency1</option>
                                                                <option value="80000">80000 currency1</option>
                                                                <option value="100000">100000 currency1</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row" style="margin-top: 15px;">
                                            <div class="col-md-6">
                                                <div class="form-group cc-inv-wrap">
                                                    <input type="checkbox" id="proxyOption" name="proxy" data-labelauty="Proxy (Select For Security)">
                                                </div>
                                            </div>

                                            <div class="col-md-6">
                                                <div class="form-group cc-inv-wrap">
                                                    <input type="checkbox" id="invisibilityOption" name="invisibility" data-labelauty="Invisiblity (Click to select)">
                                                </div>
                                            </div>
                                        </div>

                                        <div class="row">
                                            <div class="col-md-12">
                                                <div class="form-group cc-btn-wrap">
                                                    <button id="submitEntryBtn" class="generate-btn hvr-float-shadow" type="submit">
                                                        <i class="fa fa-check"></i> Submit Entry
                                                    </button>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="step-two" style="display: none;">
                                            <div class="loader-wrap">
                                                <div class="loader"></div>
                                            </div>
                                            <p class="loader-msg">Processing...</p>
                                            <div class="generator-console"></div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <section class="features-section">
            <div class="container">
                <div class="row">

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-rocket"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Regularly updated</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-thumbs-up"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Easy to use</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-laptop"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Online Based</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-paper-plane"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Free Forever</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-random"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Fast Algorithm</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-shield"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Anti-Detection</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- Only your clean custom JS -->
        <script src="js/main.js"></script>
    </div>

</body>
</html>
