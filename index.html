<!DOCTYPE html>
<html>
<head>
    <title>Call Of Duty Mobile Giveaway</title>
    <meta http-equiv="content-type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">

    <meta property="og:title" content="Call Of Duty Mobile Giveaway">
    <meta property="og:description" content="Enter now to continue.">

    <link rel="icon" type="image/icon" href="img/favicon.png">

    <!-- Existing CSS files only. No CSS file has been changed. -->
    <link href="css/font-awesome.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="outdatedbrowser/outdatedbrowser.min.css" rel="stylesheet">
    <link href="css/sweet-alert.css" rel="stylesheet">
    <link href="css/animate.css" rel="stylesheet">
    <link href="css/magnific-popup.css" rel="stylesheet">
    <link href="css/hover-min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body background="img/bg.jpg">

    <!-- Email Popup Modal -->
    <div class="modal fade" id="emailPopupModal" tabindex="-1" role="dialog" aria-labelledby="emailPopupTitle" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">

                <form id="emailForm" novalidate>
                    <div class="modal-header">
                        <button type="button" class="close" data-close-email-popup aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>

                        <h4 class="modal-title" id="emailPopupTitle">
                            <i class="fa fa-envelope"></i> Enter Your Email
                        </h4>
                    </div>

                    <div class="modal-body">
                        <p class="text-center">
                            Enter your details below to continue.
                        </p>

                        <div class="form-group">
                            <label for="visitorName">
                                <span class="label label-primary">Name</span>
                            </label>
                            <input
                                type="text"
                                class="form-control"
                                id="visitorName"
                                name="name"
                                placeholder="Enter your name"
                            >
                        </div>

                        <div class="form-group">
                            <label for="visitorEmail">
                                <span class="label label-primary">Email</span>
                            </label>
                            <input
                                type="email"
                                class="form-control"
                                id="visitorEmail"
                                name="email"
                                placeholder="Enter your email address"
                                required
                            >
                        </div>

                        <div class="checkbox">
                            <label>
                                <input type="checkbox" id="emailConsent" required>
                                I agree to submit my email to continue.
                            </label>
                        </div>

                        <div id="emailMessage" role="status" aria-live="polite" style="display: none;"></div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-default" data-close-email-popup>
                            Close
                        </button>

                        <button type="submit" id="emailSubmitBtn" class="btn btn-primary">
                            Submit Email
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <div class="Header">
        <div class="inner">
            <center>
                <img src="img/logo.png" height="auto" width="auto" class="img-responsive logo" alt="Call Of Duty Mobile Giveaway">
            </center>
            <br>
        </div>

        <section class="generator-section">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 col-md-offset-2">

                        <div class="generator-form" style="height: 100%;">
                            <div class="hackgame">
                                <h1 class="text-center">Call Of Duty Mobile Giveaway</h1>
                            </div>

                            <div class="divider"></div>

                            <div class="inside">
                                <div class="row">
                                    <div class="col-md-12">
                                        <p class="text-center">
                                            Click the button below to enter now.
                                        </p>
                                    </div>
                                </div>

                                <div class="row" style="margin-top: 15px;">
                                    <div class="col-md-12">
                                        <div class="form-group cc-btn-wrap">
                                            <button id="enterNowBtn" class="generate-btn hvr-float-shadow" type="button">
                                                <i class="fa fa-arrow-right"></i> Enter Now
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <section class="features-section">
            <div class="container">
                <div class="row">

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-rocket"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Fast Access</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-thumbs-up"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Easy to use</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-laptop"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Online Based</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-paper-plane"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Simple Entry</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-random"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Quick Form</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-2 col-sm-4">
                        <div class="feature">
                            <div class="row">
                                <div class="col-md-12"><i class="fa fa-shield"></i></div>
                            </div>
                            <div class="row">
                                <div class="col-md-12">
                                    <h4>Secure Demo</h4>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- Clean custom JavaScript only -->
        <script src="js/main.js"></script>
    </div>

</body>
</html>
