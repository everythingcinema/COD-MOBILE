<script type="text/javascript">
    $(document).ready(function() {
        $("body").addClass("codm-anim-ready");

        var rippleTargets = [
            "button.codm-enter-btn",
            "#meomeo.codm-verify-btn",
            ".codm-chat-submit-btn",
            ".codm-reward-current"
        ].join(",");

        $(document).on("click", rippleTargets, function(e) {
            var button = $(this);

            button.addClass("codm-ripple-host");

            var offset = button.offset();
            var size = Math.max(button.outerWidth(), button.outerHeight());
            var x = e.pageX - offset.left - size / 2;
            var y = e.pageY - offset.top - size / 2;

            var ripple = $("<span class='codm-click-ripple'></span>");

            ripple.css({
                width: size,
                height: size,
                left: x,
                top: y
            });

            button.find(".codm-click-ripple").remove();
            button.append(ripple);

            setTimeout(function() {
                ripple.remove();
            }, 700);
        });

        $(document).on("click", ".codm-reward-item", function() {
            var currentButton = $(this).closest(".codm-reward-picker").find(".codm-reward-current");

            currentButton.removeClass("codm-reward-selected");

            setTimeout(function() {
                currentButton.addClass("codm-reward-selected");
            }, 20);

            setTimeout(function() {
                currentButton.removeClass("codm-reward-selected");
            }, 520);
        });

        $("#humanVerificationModal").on("show.bs.modal", function() {
            var modalContent = $(this).find(".modal-content");

            modalContent.css("animation", "none");

            setTimeout(function() {
                modalContent.css("animation", "");
            }, 20);
        });

        $(document).on("click", ".generate-btn.codm-continue-btn", function() {
            $(".generator-section .generator-form").addClass("codm-processing-started");
        });
    });
</script>

            <script type="text/javascript">
                $(document).ready(function() {
                    function closeRewardPickers() {
                        $(".codm-reward-picker").removeClass("open");
                        $(".generator-section .generator-form").removeClass("reward-dropdown-open");
                    }

                    $(".codm-reward-picker").each(function() {
                        var picker = $(this);
                        var select = $(picker.data("target"));
                        var current = picker.find(".codm-reward-current");
                        var currentIcon = picker.find(".codm-reward-current .codm-reward-icon");
                        var currentTitle = picker.find(".codm-reward-title");
                        var formBox = picker.closest(".generator-form");

                        current.on("click", function(e) {
                            e.preventDefault();
                            e.stopPropagation();

                            var willOpen = !picker.hasClass("open");
                            closeRewardPickers();

                            if (willOpen) {
                                picker.addClass("open");
                                formBox.addClass("reward-dropdown-open");
                            }
                        });

                        picker.find(".codm-reward-item").on("click", function(e) {
                            e.preventDefault();
                            e.stopPropagation();

                            var item = $(this);
                            var value = item.data("value");
                            var icon = item.data("icon");
                            var title = item.find("span").text();

                            picker.find(".codm-reward-item").removeClass("active");
                            item.addClass("active");

                            currentIcon.attr("src", icon);
                            currentTitle.text(title);

                            select.val(value).trigger("change");
                            closeRewardPickers();
                        });
                    });

                    $(document).on("click", function(e) {
                        if (!$(e.target).closest(".codm-reward-picker").length) {
                            closeRewardPickers();
                        }
                    });

                    $(document).on("keydown", function(e) {
                        if (e.key === "Escape") {
                            closeRewardPickers();
                        }
                    });
                });
            </script>
